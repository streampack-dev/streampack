spring:
  datasource:
    url: jdbc:tc:postgresql:17://nevet
    hikari:
      maximum-pool-size: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    clean-disabled: true
    enabled: true
    out-of-order: true
  mail:
    host: localhost
    port: 3025

streampack:
  base-url: http://localhost:8080
  jwt:
    secret: change-me-in-production
  github:
    webhook-secret-key: test-github-webhook-secret-key

springdoc:
  api-docs:
    enabled: true
